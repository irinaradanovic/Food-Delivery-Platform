<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Masovno ažuriranje cenovnika</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        nav {
            background: white; border-bottom: 1px solid #e5e0d8;
            padding: 0 40px; height: 68px; width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; z-index: 100;
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-icon { width: 76px; height: 96px; display: flex; align-items: center; justify-content: center; }
        .nav-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #1a1a1a; font-weight: 700; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; color: #6b7280; transition: all 0.15s; }
        .nav-links a:hover { background: #f3f4f6; color: #1a1a1a; }
        .nav-links a.active { background: #2d6a2d !important; color: white !important; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { font-size: 13px; color: #6b7280; background: #f3f4f6; padding: 6px 12px; border-radius: 20px; font-family: sans-serif; }
        .btn-odjava { background: none; border: 1.5px solid #e5e0d8; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer; transition: all 0.15s; }
        .btn-odjava:hover { border-color: #dc2626; color: #dc2626; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pt-28 p-8">

<nav>
    <div class="nav-logo">
        <span class="nav-logo-text">Platforma za dostavu hrane</span>
    </div>
    <div class="nav-links">
        <a href="restorani.html">Restorani</a>
        <a href="meniji.html" class="active">Meniji</a>
        <a href="porudzbine.html">Porudžbine</a>
    </div>
</nav>

<div class="max-w-4xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <div class="space-y-1">
            <h1 class="text-3xl font-extrabold text-gray-900">Ažuriranje cenovnika</h1>
            <p class="text-gray-500 text-sm">Unesite nove cene za stavke. Stavke koje ne promenite zadržaće trenutnu cenu. Snimanjem se automatski zatvara stari i kreira nova verzija menija.</p>
        </div>
    </div>

    <hr class="border-gray-200">

    <form id="forma-cenovnik" onsubmit="sacuvajCenovnik(event)" class="space-y-8">
        <div id="kategorije-cene-kontejner" class="space-y-8">
            <div class="text-center py-8 text-gray-500 italic animate-pulse">Učitavanje stavki menija...</div>
        </div>

        <div class="flex justify-end gap-4 pt-4 border-t border-gray-200">
            <button type="button" onclick="nazadNaMeni()"
                    class="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-xl transition cursor-pointer">
                Otkaži
            </button>
            <button type="submit"
                    class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl shadow-md transition cursor-pointer">
                Sačuvaj izmene i kreiraj novu verziju
            </button>
        </div>
    </form>
</div>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script>
    zastitiStranicu();

    const urlParams = new URLSearchParams(window.location.search);
    const meniId = urlParams.get('meniId');
    let listaStavki = [];

    if (!meniId) {
        alert("Meni ID nije prosleđen!");
        window.location.href = "meniji.html";
    }

    async function ucitajStavkeZaCenovnik() {
        try {
            listaStavki = await apiFetch(`/stavke-menija/meni/${meniId}`);
            const kontejner = document.getElementById('kategorije-cene-kontejner');
            kontejner.innerHTML = '';

            if (!listaStavki || listaStavki.length === 0) {
                kontejner.innerHTML = `<p class="text-gray-500 italic text-center py-6">Ovaj meni trenutno nema stavki za izmenu cena.</p>`;
                return;
            }

            const grupisano = {};
            listaStavki.forEach(s => {
                const katNaziv = s.proizvod.kategorija ? s.proizvod.kategorija.naziv : 'Ostalo';
                if (!grupisano[katNaziv]) grupisano[katNaziv] = [];
                grupisano[katNaziv].push(s);
            });

            for (const [kategorija, stavkeKat] of Object.entries(grupisano)) {
                let katBlok = `
                    <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm space-y-4">
                        <h3 class="text-lg font-bold text-gray-800 border-b border-gray-100 pb-2">${kategorija}</h3>
                        <div class="divide-y divide-gray-100">
                `;

                stavkeKat.forEach(s => {
                    katBlok += `
                        <div class="py-3 flex items-center justify-between gap-4">
                            <div class="flex-1">
                                <h4 class="font-semibold text-gray-900">${s.proizvod.naziv}</h4>
                                <p class="text-xs text-gray-400">Trenutna cena: ${s.cena} RSD</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="number"
                                       data-stavka-id="${s.stavkaId}"
                                       value="${s.cena}"
                                       min="1"
                                       step="0.01"
                                       required
                                       class="w-32 border border-gray-300 rounded-lg p-2 text-right font-bold text-gray-800 outline-none focus:border-emerald-500 bg-gray-50 focus:bg-white transition">
                                <span class="text-sm font-semibold text-gray-500">RSD</span>
                            </div>
                        </div>
                    `;
                });

                katBlok += `
                        </div>
                    </div>
                `;
                kontejner.innerHTML += katBlok;
            }

        } catch (error) {
            console.error("Greška:", error);
            document.getElementById('kategorije-cene-kontejner').innerHTML = `<p class="text-red-500 font-medium">Greška prilikom učitavanja podataka.</p>`;
        }
    }

    async function sacuvajCenovnik(event) {
        event.preventDefault();

        const ulogovaniKorisnikId = localStorage.getItem('korisnikId');
        const inputs = document.querySelectorAll('input[data-stavka-id]');
        const izmeneCena = [];

        inputs.forEach(input => {
            const stavkaId = parseInt(input.getAttribute('data-stavka-id'));
            const novaCena = parseFloat(input.value);

            const originalnaStavka = listaStavki.find(s => s.stavkaId === stavkaId);

            if (originalnaStavka && originalnaStavka.cena !== novaCena) {
                izmeneCena.push({
                    stavkaId: stavkaId,
                    novaCena: novaCena
                });
            }
        });

        if (izmeneCena.length === 0) {
            alert("Niste izmenili nijednu cenu.");
            return;
        }

        const payload = { izmeneCena: izmeneCena };

        try {
            const response = await apiFetch(`/stavke-menija/meni/${meniId}/masovni-cenovnik`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Id': ulogovaniKorisnikId
                },
                body: JSON.stringify(payload)
            });

            alert("Cenovnik uspešno ažuriran! Kreirana je nova verzija menija.");

            if (response && response.meniId) {
                window.location.href = `detalji-menija.html?meniId=${response.meniId}`;
            } else {
                window.location.href = `detalji-menija.html?meniId=${meniId}`;
            }

        } catch (error) {
            console.error("Greška:", error);
            alert(error.message || "Došlo je do greške prilikom čuvanja cenovnika.");
        }
    }

    function nazadNaMeni() {
        window.location.href = `detalji-menija.html?meniId=${meniId}`;
    }

    window.addEventListener('DOMContentLoaded', ucitajStavkeZaCenovnik);
</script>
</body>
</html>
