<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Pregled menija</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        nav {
            background: white; border-bottom: 1px solid #e5e0d8;
            padding: 0 40px; height: 68px; width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; z-index: 100;
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-icon { width: 76px; height: 96px; display: flex; align-items: center; justify-content: center; }
        .nav-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #1a1a1a; font-weight: 700; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; color: #6b7280; transition: all 0.15s; }
        .nav-links a:hover { background: #f3f4f6; color: #1a1a1a; }
        .nav-links a.active { background: #2d6a2d !important; color: white !important; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { font-size: 13px; color: #6b7280; background: #f3f4f6; padding: 6px 12px; border-radius: 20px; font-family: sans-serif; }
        .btn-odjava { background: none; border: 1.5px solid #e5e0d8; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer; transition: all 0.15s; }
        .btn-odjava:hover { border-color: #dc2626; color: #dc2626; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pt-24 p-8">

<nav></nav>

<div class="max-w-6xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Meniji restorana</h1>
    </div>

    <div id="meniji-kontejner" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
        <p class="text-gray-500 col-span-4">Učitavanje menija...</p>
    </div>
</div>

<div id="modal-novi-meni" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl space-y-4 mx-4">
        <h2 class="text-2xl font-bold text-gray-800">Dodaj novi meni</h2>

        <form id="forma-novi-meni" class="space-y-4" onsubmit="sacuvajNoviMeni(event)">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Naziv menija</label>
                <input type="text" id="novi-naziv" required class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-emerald-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Opis</label>
                <textarea id="novi-opis" rows="3" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-emerald-500"></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Tip menija</label>
                <select id="novi-tip-menija" required onchange="promeniTipForme()" class="w-full border border-gray-300 rounded-lg p-2.5 bg-white outline-none focus:border-emerald-500">
                    <option value="" disabled selected>Izaberite tip...</option>
                    <option value="STANDARDNI">Standardni meni</option>
                    <option value="SEZONSKI">Sezonski meni</option>
                    <option value="VREMENSKI">Vremenski meni</option>
                </select>
            </div>

            <div id="forma-sekcija-sezonski" class="hidden grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Početak sezone</label>
                    <input type="date" id="novi-pocetak-sezone" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Kraj sezone</label>
                    <input type="date" id="novi-kraj-sezone" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                </div>
            </div>

            <div id="forma-sekcija-vremenski" class="hidden grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Vreme početka</label>
                    <input type="time" id="novi-vreme-od" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Vreme kraja</label>
                    <input type="time" id="novi-vreme-do" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="zatvoriModal()" class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium rounded-lg transition cursor-pointer">Otkaži</button>
                <button type="submit" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg transition shadow-sm cursor-pointer">Sačuvaj</button>
            </div>
        </form>
    </div>
</div>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script>
    zastitiStranicu();

    const urlParams = new URLSearchParams(window.location.search);
    const restoranId = urlParams.get('restoranId');

    async function ucitajMenije() {
        if (!restoranId) {
            document.getElementById('meniji-kontejner').innerHTML = '<p class="text-red-500 col-span-4">Nije prosleđen ID restorana.</p>';
            return;
        }

        try {
            const meniji = await apiFetch(`/meni/restorani/${restoranId}`);
            const kontejner = document.getElementById('meniji-kontejner');
            kontejner.innerHTML = '';

            if (meniji && meniji.length > 0) {
                meniji.forEach(meni => {
                    const kartica = document.createElement('div');

                    // Ako je meni neaktivan, dodajemo 'opacity-60' da bude blago zamućen
                    //const neaktivanKlasa = !meni.aktivan ? "opacity-60 grayscale-[20%]" : "";
                    kartica.className = `bg-white rounded-lg shadow-md overflow-hidden border border-gray-200 flex flex-col justify-between cursor-pointer transition transform hover:-translate-y-1`;

                    let emoji = "🍔";
                    let bgBoja = "bg-amber-100";
                    let prikazTipa = meni.tipMenija;

                    if (meni.tipMenija === 'VREMENSKI') {
                        emoji = "⏳";
                        bgBoja = "bg-blue-100";
                    } else if (meni.tipMenija === 'SEZONSKI') {
                        emoji = "🍂";
                        bgBoja = "bg-orange-100";
                    } else if (meni.tipMenija === 'STANDARDNI' || meni.tipMenija === 'STANDARDNIMENI') {
                        emoji = "✨";
                        bgBoja = "bg-emerald-100";
                        prikazTipa = 'STANDARDNI';
                    }
                    const danas = new Date();
                    const pocetak = meni.pocetakSezone ? new Date(meni.pocetakSezone) : null;
                    const kraj = meni.krajSezone ? new Date(meni.krajSezone) : null;

                    let statusBedz = '';
                    if (meni.aktivan) {
                        statusBedz = `<span class="text-[10px] font-bold uppercase px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-full ml-2">Aktivan</span>`;
                    } else if (meni.tipMenija === 'SEZONSKI' && pocetak && danas < pocetak) {
                        statusBedz = `<span class="text-[10px] font-bold uppercase px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full ml-2">Uskoro počinje</span>`;
                    } else {
                        statusBedz = `<span class="text-[10px] font-bold uppercase px-2 py-0.5 bg-rose-100 text-rose-700 rounded-full ml-2">Deaktiviran</span>`;
                    }
                    kartica.innerHTML = `
        <div>
            <div class="w-full h-40 ${bgBoja} flex items-center justify-center text-6xl select-none">
                ${emoji}
            </div>
            <div class="p-4">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-semibold uppercase px-2 py-1 bg-gray-100 text-gray-600 rounded-full">${prikazTipa}</span>
                    ${statusBedz}
                </div>
                <h3 class="text-xl font-bold text-gray-800 mt-2">${meni.naziv}</h3>
                <p class="text-xs text-gray-400 mt-1">Verzija: ${meni.verzija || 'v1'}</p>
            </div>
        </div>
    `;

                    kartica.onclick = () => {
                        window.location.href = `detalji-menija.html?meniId=${meni.meniId}`;
                    };
                    kontejner.appendChild(kartica);
                });
            }

            const dugmeDodaj = document.createElement('div');
            dugmeDodaj.className = "bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg flex flex-col justify-center items-center p-8 cursor-pointer min-h-[240px] shadow-md transition transform hover:-translate-y-1 text-center";
            dugmeDodaj.innerHTML = `
                    <div class="w-14 h-14 bg-white text-emerald-600 rounded-full flex items-center justify-center text-3xl font-bold shadow-sm mb-4">
                        +
                    </div>
                    <span class="font-bold text-lg">Dodaj novi meni</span>
                `;

            dugmeDodaj.onclick = () => {
                otvoriModal();
            };

            kontejner.appendChild(dugmeDodaj);

        } catch (error) {
            console.error("Greška:", error);
            document.getElementById('meniji-kontejner').innerHTML = '<p class="text-red-500 col-span-4">Greška pri učitavanju podataka.</p>';
        }
    }

    function otvoriModal() {
        document.getElementById('forma-novi-meni').reset();
        document.getElementById('forma-sekcija-sezonski').classList.add('hidden');
        document.getElementById('forma-sekcija-vremenski').classList.add('hidden');
        document.getElementById('modal-novi-meni').classList.remove('hidden');
    }

    function zatvoriModal() {
        document.getElementById('modal-novi-meni').classList.add('hidden');
    }

    function promeniTipForme() {
        const izabraniTip = document.getElementById('novi-tip-menija').value;
        const sekcijaSezonski = document.getElementById('forma-sekcija-sezonski');
        const sekcijaVremenski = document.getElementById('forma-sekcija-vremenski');

        const pocetakSezone = document.getElementById('novi-pocetak-sezone');
        const krajSezone = document.getElementById('novi-kraj-sezone');
        const vremeOd = document.getElementById('novi-vreme-od');
        const vremeDo = document.getElementById('novi-vreme-do');

        if (izabraniTip === 'STANDARDNI') {
            sekcijaSezonski.classList.add('hidden');
            sekcijaVremenski.classList.add('hidden');
            pocetakSezone.required = false;
            krajSezone.required = false;
            vremeOd.required = false;
            vremeDo.required = false;
        }
        else if (izabraniTip === 'SEZONSKI') {
            sekcijaSezonski.classList.remove('hidden');
            sekcijaVremenski.classList.add('hidden');
            pocetakSezone.required = true;
            krajSezone.required = true;
            vremeOd.required = false;
            vremeDo.required = false;
        } else if (izabraniTip === 'VREMENSKI') {
            sekcijaSezonski.classList.add('hidden');
            sekcijaVremenski.classList.remove('hidden');
            pocetakSezone.required = false;
            krajSezone.required = false;
            vremeOd.required = true;
            vremeDo.required = true;
        }
    }

    async function sacuvajNoviMeni(event) {
        event.preventDefault();
        const ulogovaniKorisnikId = localStorage.getItem('korisnikId');
        const tipMenija = document.getElementById('novi-tip-menija').value;

        const noviMeni = {
            tipMenija: tipMenija,
            naziv: document.getElementById('novi-naziv').value,
            opis: document.getElementById('novi-opis').value,
            restoran: {
                restoranId: parseInt(restoranId)
            }
        };

        if (tipMenija === 'SEZONSKI') {
            noviMeni.pocetakSezone = document.getElementById('novi-pocetak-sezone').value || null;
            noviMeni.krajSezone = document.getElementById('novi-kraj-sezone').value || null;
        } else if (tipMenija === 'VREMENSKI') {
            const odVreme = document.getElementById('novi-vreme-od').value;
            const doVreme = document.getElementById('novi-vreme-do').value;
            noviMeni.vremeOd = odVreme ? odVreme + ":00" : null;
            noviMeni.vremeDo = doVreme ? doVreme + ":00" : null;
        }

        try {

            const kreiraniMeni = await apiFetch(`/meni`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Id': ulogovaniKorisnikId
                },
                body: JSON.stringify(noviMeni)
            });

            zatvoriModal();
            alert("Meni je uspešno kreiran!");

            if (kreiraniMeni && kreiraniMeni.meniId) {
                window.location.href = `detalji-menija.html?meniId=${kreiraniMeni.meniId}`;
            } else {
                await ucitajMenije();
            }

        } catch (error) {
            console.error("Greška prilikom kreiranja menija:", error);
            alert(error.message || "Nemate pravo pristupa ili je restoran nepostojeći.");
        }
    }

    window.addEventListener('DOMContentLoaded', ucitajMenije);
</script>
</body>
</html>
