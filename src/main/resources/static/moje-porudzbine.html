<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje porudzbine - Big Bite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root { --green:#2d6a2d; --green-lt:#3a8a3a; --cream:#faf7f2; --dark:#1a1a1a; --gray:#6b7280; --border:#e5e0d8; --danger:#dc2626; --warning:#b45309; }
        body { font-family:'DM Sans', sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }
        nav { background:white; border-bottom:1px solid var(--border); padding:0 40px; height:68px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
        .nav-logo-icon { width:76px; height:96px; display:flex; align-items:center; justify-content:center; }
        .nav-logo-text { font-family:'Playfair Display', serif; font-size:20px; color:var(--dark); }
        .nav-links { display:flex; align-items:center; gap:4px; }
        .nav-links a { padding:8px 16px; border-radius:8px; text-decoration:none; font-size:14px; font-weight:500; color:var(--gray); transition:all .15s; }
        .nav-links a:hover, .nav-links a.active { background:var(--green); color:white; }
        .nav-right { display:flex; align-items:center; gap:12px; }
        .nav-user { font-size:13px; color:var(--gray); background:#f3f4f6; padding:6px 12px; border-radius:20px; }
        .btn-odjava, .nav-korpa { background:none; border:1.5px solid var(--border); border-radius:8px; padding:7px 14px; font-size:13px; font-weight:500; color:var(--gray); cursor:pointer; }
        main { max-width:1120px; margin:0 auto; padding:36px 24px 56px; }
        .header { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:22px; }
        h1 { font-family:'Playfair Display', serif; font-size:34px; line-height:1.1; }
        .subtitle { color:var(--gray); margin-top:6px; font-size:14px; }
        select, button { font:inherit; }
        select { border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; background:white; color:var(--dark); }
        .btn { border:1.5px solid var(--border); border-radius:8px; padding:10px 14px; background:white; color:var(--dark); font-weight:700; cursor:pointer; transition:all .15s; }
        .btn:hover { border-color:var(--green); color:var(--green); }
        .orders { display:flex; flex-direction:column; gap:14px; }
        .order { background:white; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .order-head { display:grid; grid-template-columns:1fr auto; gap:16px; padding:18px 20px; border-bottom:1px solid var(--border); }
        .order-title { font-weight:800; font-size:18px; }
        .order-meta { color:var(--gray); font-size:13px; margin-top:5px; display:flex; gap:12px; flex-wrap:wrap; }
        .badge { display:inline-flex; align-items:center; border-radius:999px; padding:5px 10px; font-size:12px; font-weight:800; background:#f3f4f6; color:#374151; white-space:nowrap; }
        .badge.waiting { background:#fff7ed; color:var(--warning); }
        .badge.ok { background:#ecfdf5; color:#047857; }
        .badge.cancel { background:#fef2f2; color:#b91c1c; }
        .order-body { display:grid; grid-template-columns:minmax(0,1fr) 260px; gap:18px; padding:18px 20px; }
        .items { display:flex; flex-direction:column; gap:8px; }
        .item { display:flex; justify-content:space-between; gap:14px; color:#374151; font-size:14px; }
        .item-note { color:var(--gray); font-size:12px; margin-top:2px; }
        .details { color:#374151; font-size:14px; line-height:1.7; }
        .history { border-top:1px solid var(--border); padding:14px 20px; background:#fdfcf9; }
        .history-title { font-size:12px; font-weight:800; color:var(--gray); text-transform:uppercase; margin-bottom:10px; }
        .timeline { display:flex; flex-wrap:wrap; gap:8px; }
        .timeline-item { display:flex; align-items:center; gap:8px; background:white; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12px; color:#374151; }
        .timeline-dot { width:8px; height:8px; border-radius:50%; background:var(--green); flex:0 0 auto; }
        .timeline-time { color:var(--gray); }
        .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; padding:0 20px 18px; }
        .empty, .error { background:white; border:1px solid var(--border); border-radius:8px; padding:28px; text-align:center; color:var(--gray); }
        .error { color:var(--danger); }
        @media (max-width:780px) { nav { padding:0 18px; } .header { align-items:flex-start; flex-direction:column; } .order-head, .order-body { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<nav></nav>
<main>
    <div class="header">
        <div>
            <h1>Moje porudzbine</h1>
            <p class="subtitle">Pregled trenutnog statusa i istorije svih prethodnih porudzbina.</p>
        </div>
        <div>
            <select id="filter" onchange="renderPorudzbine()">
                <option value="SVE">Sve porudzbine</option>
                <option value="KREIRANA">Kreirane</option>
                <option value="POTVRDJENA">Potvrdjene</option>
                <option value="U_PRIPREMI">U pripremi</option>
                <option value="SPREMNA_ZA_DOSTAVU">Spremne za dostavu</option>
                <option value="PREUZETA">Preuzete</option>
                <option value="ISPORUCENA">Isporucene</option>
                <option value="OTKAZANA">Otkazane</option>
            </select>
            <button class="btn" onclick="ucitajPorudzbine()">Osvezi</button>
        </div>
    </div>
    <div id="porudzbine" class="orders">
        <div class="empty">Ucitavanje porudzbina...</div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    zastitiStranicu();

    let porudzbine = [];
    let istorijaStatusa = {};

    function formatRsd(value) {
        return (Number(value || 0)).toLocaleString('sr-RS') + ' RSD';
    }

    function formatDatum(value) {
        if (!value) return '';
        return new Date(value).toLocaleString('sr-RS', { dateStyle:'short', timeStyle:'short' });
    }

    function badgeClass(status) {
        if (status === 'KREIRANA' || status === 'SPREMNA_ZA_DOSTAVU') return 'waiting';
        if (status === 'OTKAZANA') return 'cancel';
        if (status === 'ISPORUCENA') return 'ok';
        return '';
    }

    function stavkeHtml(porudzbina) {
        const stavke = porudzbina.stavke || [];
        if (stavke.length === 0) return '<div class="item">Nema stavki za prikaz.</div>';
        return stavke.map(stavka => {
            const proizvod = stavka.stavkaMenija?.proizvod;
            const naziv = stavka.naziv || proizvod?.naziv || 'Stavka menija';
            const cena = stavka.ukupnaCena ?? stavka.cena;
            return `
                <div>
                    <div class="item">
                        <span>${naziv} x ${stavka.kolicina}</span>
                        <strong>${formatRsd(cena)}</strong>
                    </div>
                    ${stavka.napomena ? `<div class="item-note">Napomena: ${stavka.napomena}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    function racuniHtml(porudzbina) {
        const dugmad = [];
        if (porudzbina.imaRacun) {
            dugmad.push(`<button class="btn" onclick="preuzmiRacun(${porudzbina.porudzbinaId}, 'racun')">Preuzmi racun</button>`);
        }
        if (porudzbina.imaStorno) {
            dugmad.push(`<button class="btn" onclick="preuzmiRacun(${porudzbina.porudzbinaId}, 'storno')">Preuzmi storno</button>`);
        }
        return dugmad.length ? `<div class="actions">${dugmad.join('')}</div>` : '';
    }

    function istorijaHtml(porudzbina) {
        const istorija = istorijaStatusa[porudzbina.porudzbinaId] || [];
        if (istorija.length === 0) return '<div class="history"><div class="history-title">Istorija statusa</div><div class="timeline-item">Nema zabelezenih promena statusa.</div></div>';
        return `
            <div class="history">
                <div class="history-title">Istorija statusa</div>
                <div class="timeline">
                    ${istorija.map(item => `
                        <div class="timeline-item">
                            <span class="timeline-dot"></span>
                            <strong>${item.status}</strong>
                            <span class="timeline-time">${formatDatum(item.vremePromene)}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderPorudzbine() {
        const filter = document.getElementById('filter').value;
        const lista = filter === 'SVE' ? porudzbine : porudzbine.filter(p => p.status === filter);
        const root = document.getElementById('porudzbine');
        if (lista.length === 0) {
            root.innerHTML = '<div class="empty">Nema porudzbina za izabrani filter.</div>';
            return;
        }

        root.innerHTML = lista.map(p => `
            <article class="order">
                <div class="order-head">
                    <div>
                        <div class="order-title">Porudzbina #${p.porudzbinaId}</div>
                        <div class="order-meta">
                            <span>${formatDatum(p.datumKreiranja)}</span>
                            <span>${p.adresaDostave || 'Bez adrese'}</span>
                            <span>${p.nacinPlacanja || 'Placanje nije evidentirano'}</span>
                        </div>
                    </div>
                    <span class="badge ${badgeClass(p.status)}">${p.status}</span>
                </div>
                <div class="order-body">
                    <div class="items">${stavkeHtml(p)}</div>
                    <div class="details">
                        <div><strong>Artikli:</strong> ${formatRsd(p.cenaArtikala || p.ukupnaCena)}</div>
                        <div><strong>Dostava:</strong> ${formatRsd(p.cenaDostave)}</div>
                        <div><strong>Ukupno:</strong> ${formatRsd(p.ukupnaCena)}</div>
                        <div><strong>Placanje:</strong> ${p.statusPlacanja || '-'}</div>
                        <div><strong>Dostavljac:</strong> ${p.dostavljacId ? `#${p.dostavljacId}` : 'Nije dodeljen'}</div>
                        ${p.napomena ? `<div><strong>Napomena:</strong> ${p.napomena}</div>` : ''}
                    </div>
                </div>
                ${istorijaHtml(p)}
                ${racuniHtml(p)}
            </article>
        `).join('');
    }

    async function preuzmiRacun(porudzbinaId, tip) {
        try {
            await api.preuzmiPdfPorudzbine(porudzbinaId, tip);
        } catch {
            alert('Preuzimanje racuna nije uspelo.');
        }
    }

    async function ucitajIstorijuZaPorudzbine() {
        const entries = await Promise.all(porudzbine.map(async p => {
            try {
                return [p.porudzbinaId, await api.getIstorijaStatusaPorudzbine(p.porudzbinaId)];
            } catch (e) {
                return [p.porudzbinaId, []];
            }
        }));
        istorijaStatusa = Object.fromEntries(entries);
    }

    async function ucitajPorudzbine() {
        const root = document.getElementById('porudzbine');
        root.innerHTML = '<div class="empty">Ucitavanje porudzbina...</div>';
        try {
            porudzbine = await api.getPorudzbineTrenutnogKorisnika();
            await ucitajIstorijuZaPorudzbine();
            renderPorudzbine();
        } catch (e) {
            root.innerHTML = '<div class="error">Nije moguce ucitati istoriju porudzbina.</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('uloga') !== 'KUPAC') {
            window.location.href = '/izbor-restorana.html';
            return;
        }
        ucitajPorudzbine();
    });
</script>
</body>
</html>
