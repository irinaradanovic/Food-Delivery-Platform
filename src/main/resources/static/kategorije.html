<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Bite – Kategorije</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #2d6a2d; --green-lt: #3a8a3a;
            --orange: #e8721c; --cream: #faf7f2;
            --dark: #1a1a1a; --gray: #6b7280; --border: #e5e0d8;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }

        nav {
            background: white; border-bottom: 1px solid var(--border);
            padding: 0 40px; height: 68px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-icon { width: 76px; height: 96px; display: flex; align-items: center; justify-content: center; }
        .nav-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark); }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; color: var(--gray); transition: all 0.15s; }
        .nav-links a:hover { background: #f3f4f6; color: var(--dark); }
        .nav-links a.active { background: var(--green); color: white; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { font-size: 13px; color: var(--gray); background: #f3f4f6; padding: 6px 12px; border-radius: 20px; }
        .btn-odjava { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; transition: all 0.15s; }
        .btn-odjava:hover { border-color: #dc2626; color: #dc2626; }

        main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--dark); }
        .page-header p { color: var(--gray); font-size: 15px; margin-top: 4px; }

        /* Kategorije grid */
        .kat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 48px;
        }

        /* Kategorija kartica sa srcem */
        .kat-card {
            background: white; border: 2px solid var(--border);
            border-radius: 18px; padding: 24px 16px 18px;
            text-align: center; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .kat-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,45,0.12); }
        .kat-card.active { border-color: var(--green); background: #f0f7f0; }
        .kat-card .icon { font-size: 40px; margin-bottom: 10px; }
        .kat-card .naziv { font-weight: 600; font-size: 14px; color: var(--dark); }

        /* Srce na kategoriji */
        .btn-fav-kat {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; cursor: pointer;
            font-size: 16px; line-height: 1;
            transition: transform 0.15s;
            z-index: 2;
        }
        .btn-fav-kat:hover { transform: scale(1.3); }

        /* Proizvodi sekcija */
        .proizvodi-sekcija { display: none; }
        .sekcija-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
        }
        .sekcija-header h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--dark); }
        .sekcija-header .count {
            background: var(--green); color: white;
            font-size: 12px; font-weight: 600;
            padding: 3px 10px; border-radius: 20px;
        }

        .prod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }
        .prod-card { background: white; border-radius: 18px; border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; }
        .prod-card:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.08); }
        .prod-img { height: 160px; background: linear-gradient(135deg, #f0ede8, #e8e4dc); position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .prod-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

        /* Ikonica kategorije na jelu */
        .prod-kat-badge {
            position: absolute; bottom: 8px; right: 10px;
            background: white; border-radius: 20px;
            padding: 3px 8px; font-size: 12px;
            display: flex; align-items: center; gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: var(--green); font-weight: 600;
        }
        .prod-kat-badge .kat-ico { font-size: 13px; }

        .prod-body { padding: 16px; }
        .prod-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .prod-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--dark); }
        .btn-fav { background: none; border: none; cursor: pointer; font-size: 20px; transition: transform 0.15s; }
        .btn-fav:hover { transform: scale(1.2); }
        .prod-desc { font-size: 13px; color: var(--gray); line-height: 1.5; }

        .empty-state { text-align: center; padding: 60px 0; color: var(--gray); }
        .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
    </style>
</head>
<body>

<nav>
</nav>

<main>
    <div class="page-header">
        <h1>Kategorije</h1>
        <p>Izaberite kategoriju i pregledajte ponudu</p>
    </div>

    <div id="kat-grid" class="kat-grid">
        <div class="empty-state"><div class="icon"></div><p>Učitavanje...</p></div>
    </div>

    <div id="proizvodi-sekcija" class="proizvodi-sekcija">
        <div class="sekcija-header">
            <h2 id="sekcija-naziv"></h2>
            <span class="count" id="sekcija-count"></span>
        </div>
        <div id="prod-grid" class="prod-grid"></div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    zastitiStranicu();

    let omiljeniIds = new Set();
    let omiljeneKatIds = new Set();
    let aktivnaKategorija = null;

    const katEmoji = {
        'pizza': '', 'burger': '', 'pasta': '', 'piletina': '',
        'piće': '', 'pića': '', 'pice': '', 'pić': '', 'deserti': '', 'desert': '',
        'salate': '', 'salata': '', 'supe': '', 'supa': '',
        'riba': '', 'roštilj': '', 'ostalo': ''
    };

    function getKatEmoji(naziv) {
        if (!naziv) return '';
        const n = naziv.toLowerCase();
        for (const [k, v] of Object.entries(katEmoji)) if (n.includes(k)) return v;
        return '';
    }

    function jeKupac() {
        return localStorage.getItem('uloga') === 'KUPAC';
    }

    async function init() {
        try {
            const kupacId = getKupacId();
            let kat, omiljeni = [], omiljeneKat = [];
            if (jeKupac()) {
                [kat, omiljeni, omiljeneKat] = await Promise.all([
                    api.getKategorije(),
                    api.getOmiljeni(kupacId),
                    api.getOmiljeneKategorije(kupacId)
                ]);
            } else {
                kat = await api.getKategorije();
            }
            omiljeniIds = new Set(omiljeni.map(o => o.proizvod.proizvodId));
            omiljeneKatIds = new Set(omiljeneKat.map(o => o.kategorija.kategorijaId));
            prikaziKategorije(kat);
        } catch {
            document.getElementById('kat-grid').innerHTML =
                '<div class="empty-state"><div class="icon"></div><p>Greška.</p></div>';
        }
    }

    function prikaziKategorije(lista) {
        const grid = document.getElementById('kat-grid');
        if (!lista.length) {
            grid.innerHTML = '<div class="empty-state"><div class="icon"></div><p>Nema kategorija.</p></div>';
            return;
        }
        grid.innerHTML = lista.map(k => `
            <div class="kat-card" id="kat-${k.kategorijaId}" onclick="prikaziProizvode(${k.kategorijaId}, '${k.naziv}', this)">
                ${jeKupac() ? `<button class="btn-fav-kat" onclick="toggleOmiljenaKat(event, ${k.kategorijaId})">${omiljeneKatIds.has(k.kategorijaId) ? '❤️' : '🤍'}</button>` : ''}
                <div class="icon">${getKatEmoji(k.naziv)}</div>
                <div class="naziv">${k.naziv}</div>
            </div>
        `).join('');
    }

    async function toggleOmiljenaKat(event, katId) {
        event.stopPropagation(); // ne aktiviraj klik na karticu
        if (!jeKupac()) { window.location.href = '/login.html?poruka=morate-biti-prijavljeni'; return; }
        const kupacId = getKupacId();
        const btn = event.currentTarget;
        try {
            if (omiljeneKatIds.has(katId)) {
                await api.ukloniOmiljenuKategoriju(kupacId, katId);
                omiljeneKatIds.delete(katId);
                btn.textContent = '🤍';
                try { api.zabeleziKlikKategorija(kupacId, katId, 'UKLONI_OMILJENI'); } catch {}
            } else {
                await api.dodajOmiljenuKategoriju(kupacId, katId);
                omiljeneKatIds.add(katId);
                btn.textContent = '❤️';
                try { api.zabeleziKlikKategorija(kupacId, katId, 'DODAJ_OMILJENI'); } catch {}
            }
        } catch { alert('Greška.'); }
    }

    async function prikaziProizvode(id, naziv, el) {
        document.querySelectorAll('.kat-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        aktivnaKategorija = { id, naziv };

        const sekcija = document.getElementById('proizvodi-sekcija');
        sekcija.style.display = 'block';
        document.getElementById('sekcija-naziv').textContent = getKatEmoji(naziv) + ' ' + naziv;
        document.getElementById('sekcija-count').textContent = '...';
        document.getElementById('prod-grid').innerHTML =
            '<div class="empty-state"><div class="icon"></div><p>Učitavanje...</p></div>';

        sekcija.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            const lista = await api.getProizvodiByKategorija(id);
            document.getElementById('sekcija-count').textContent = lista.length + ' proizvoda';

            if (!lista.length) {
                document.getElementById('prod-grid').innerHTML =
                    '<div class="empty-state"><div class="icon"></div><p>Nema proizvoda u ovoj kategoriji.</p></div>';
                return;
            }

            document.getElementById('prod-grid').innerHTML = lista.map(p => {
                const katNaziv = p.kategorija?.naziv || naziv;
                const katIco = getKatEmoji(katNaziv);
                return `
                <div class="prod-card">
                    <div class="prod-img">
                        ${p.fotografija ? `<img src="${p.fotografija}" alt="${p.naziv}" loading="lazy">` : katIco}
                        <div class="prod-kat-badge">
                            <span class="kat-ico">${katIco}</span>${katNaziv}
                        </div>
                    </div>
                    <div class="prod-body">
                        <div class="prod-top">
                            <div class="prod-name">${p.naziv}</div>
                            ${jeKupac() ? `<button class="btn-fav" onclick="toggleOmiljeni(${p.proizvodId}, this)">${omiljeniIds.has(p.proizvodId) ? '❤️' : '🤍'}</button>` : ''}
                        </div>
                        <div class="prod-desc">${p.opis || 'Bez opisa'}</div>
                    </div>
                </div>
            `}).join('');
        } catch {
            document.getElementById('prod-grid').innerHTML =
                '<div class="empty-state"><div class="icon"></div><p>Greška.</p></div>';
        }
    }

    async function toggleOmiljeni(id, btn) {
        if (!jeKupac()) { window.location.href = '/login.html?poruka=morate-biti-prijavljeni'; return; }
        try {
            if (omiljeniIds.has(id)) {
                await api.ukloniOmiljeni(getKupacId(), id);
                omiljeniIds.delete(id); btn.textContent = '🤍';
            } else {
                await api.dodajOmiljeni(getKupacId(), id);
                omiljeniIds.add(id); btn.textContent = '❤️';
            }
        } catch { alert('Greška.'); }
    }

    init();
</script>
</body>
</html>
