<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Izmeni stavku menija</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen pt-12 pb-24 px-4 md:px-8">

<div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
    <div class="border-b border-gray-100 pb-6 mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Izmeni stavku u meniju</h1>
        <p class="text-sm text-gray-500 mt-1">Izmenite željena polja. Polje za sliku ostavite prazno ukoliko ne želite promenu fotografije.</p>
    </div>

    <form id="forma-izmeni-stavku" onsubmit="sacuvajIzmeneStavke(event)" class="space-y-8">

        <div class="space-y-4">
            <h3 class="text-lg font-bold text-emerald-700 border-b border-emerald-100 pb-1">1. Osnovne informacije</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Naziv proizvoda</label>
                    <input type="text" id="naziv" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Kalorije (kcal)</label>
                    <input type="number" id="kalorije" step="0.01" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Opis proizvoda</label>
                <textarea id="opis" rows="3" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 transition"></textarea>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Količina / Mera</label>
                    <input type="number" id="kolicina" step="0.01" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Merna jedinica</label>
                    <select id="mernaJedinica" required class="w-full border border-gray-200 rounded-xl p-3 bg-white outline-none focus:border-emerald-600">
                        <option value="g">grami (g)</option>
                        <option value="ml">mililitri (ml)</option>
                        <option value="kom">komad (kom)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-lg font-bold text-emerald-700 border-b border-emerald-100 pb-1">2. Nova Fotografija (Opciono)</h3>
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-8 h-8 mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="text-sm text-gray-500" id="fajl-placeholder">Izaberite novu sliku samo ako želite da zamenite staru</p>
                    </div>
                    <input type="file" id="fotografija" class="hidden" accept="image/*" onchange="prikaziImeFajla(this)" />
                </label>
            </div>
        </div>

        <div class="space-y-6">
            <h3 class="text-lg font-bold text-emerald-700 border-b border-emerald-100 pb-1">3. Taksonomija i Sastav</h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Izaberi kategoriju</label>
                    <select id="kategorijaId" class="w-full border border-gray-200 rounded-xl p-3 bg-white outline-none" onchange="toggleKategorijaUnos(this)">
                        <option value="">-- Nova kategorija (Unesi desno) --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Ili kreiraj novu kategoriju</label>
                    <input type="text" id="novaKategorijaNaziv" class="w-full border border-gray-200 rounded-xl p-3 outline-none bg-white">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase text-gray-500">Sastojci</label>
                <div id="sastojci-checkbox-kontejner" class="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-gray-50 p-4 rounded-2xl max-h-40 overflow-y-auto border border-gray-100">
                </div>
                <input type="text" id="noviSastojci" placeholder="Unesi nove sastojke razdvojene zarezom (npr. rukola, badem)" class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 transition mt-2">
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase text-gray-500">Alergeni</label>
                <div id="alergeni-checkbox-kontejner" class="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-gray-50 p-4 rounded-2xl max-h-40 overflow-y-auto border border-gray-100">
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-lg font-bold text-emerald-700 border-b border-emerald-100 pb-1">4. Cena i vreme pripreme</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Cena (RSD)</label>
                    <input type="number" id="cena" step="0.01" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vreme pripreme MIN (min)</label>
                    <input type="number" id="vremePripremeMin" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vreme pripreme MAX (min)</label>
                    <input type="number" id="vremePripremeMax" required class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-emerald-600 transition">
                </div>
            </div>
        </div>

        <div class="flex justify-end items-center gap-4 pt-6 border-t border-gray-100">
            <button type="button" onclick="vratiSeNazad()" class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold rounded-xl transition cursor-pointer">
                Otkaži
            </button>
            <button type="submit" class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl shadow-md transition cursor-pointer">
                Sačuvaj izmene
            </button>
        </div>

    </form>
</div>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script>
    zastitiStranicu();

    const urlParams = new URLSearchParams(window.location.search);
    const meniId = urlParams.get('meniId');
    const stavkaId = urlParams.get('stavkaId');
    const ulogovaniKorisnikId = localStorage.getItem('korisnikId');

    if (!meniId || !stavkaId) {
        alert("Nedostaju parametri u URL-u!");
        window.location.href = "index.html";
    }

    async function inicijalizujStranicu() {
        await ucitajSveSifarnike();
        await ucitajTrenutnuStavku();
    }

    async function ucitajSveSifarnike() {
        try {
            const opt = { headers: { 'X-User-Id': ulogovaniKorisnikId } };
            const [kategorije, sastojci, alergeni] = await Promise.all([
                apiFetch('/kategorije/menadzer', opt),
                apiFetch('/sastojci/menadzer', opt),
                apiFetch('/alergeni', opt)
            ]);

            const katSelect = document.getElementById('kategorijaId');
            kategorije.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k.kategorijaId;
                opt.textContent = k.naziv;
                katSelect.appendChild(opt);
            });

            const sastojciKon = document.getElementById('sastojci-checkbox-kontejner');
            sastojci.forEach(s => {
                sastojciKon.innerHTML += `
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer p-1 hover:bg-white rounded-md">
                        <input type="checkbox" name="sastojciIds" value="${s.sastojakId || s.id}" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                        <span>${s.naziv}</span>
                    </label>
                `;
            });

            const alergeniKon = document.getElementById('alergeni-checkbox-kontejner');
            alergeni.forEach(a => {
                alergeniKon.innerHTML += `
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer p-1 hover:bg-white rounded-md">
                        <input type="checkbox" name="alergeniIds" value="${a.alergenId || a.id}" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                        <span>${a.naziv}</span>
                    </label>
                `;
            });
        } catch (error) {
            console.error("Greška pri učitavanju šifarnika:", error);
        }
    }

    async function ucitajTrenutnuStavku() {
        try {

            const s = await apiFetch(`/stavke-menija/${stavkaId}`);
            const p = s.proizvod;

            document.getElementById('naziv').value = p.naziv;
            document.getElementById('kalorije').value = p.kalorije;
            document.getElementById('opis').value = p.opis;
            document.getElementById('kolicina').value = p.kolicina;
            document.getElementById('mernaJedinica').value = p.mernaJedinica;
            document.getElementById('cena').value = s.cena;
            document.getElementById('vremePripremeMin').value = s.vremePripremeMin;
            document.getElementById('vremePripremeMax').value = s.vremePripremeMax;


            if (p.kategorija) {
                const katSelect = document.getElementById('kategorijaId');
                katSelect.value = p.kategorija.kategorijaId;
                toggleKategorijaUnos(katSelect);
            }

            if (p.sastojci && p.sastojci.length > 0) {
                const trenSastojciIds = p.sastojci.map(sast => (sast.sastojakId || sast.id).toString());
                document.querySelectorAll('input[name="sastojciIds"]').forEach(cb => {
                    if (trenSastojciIds.includes(cb.value)) cb.checked = true;
                });
            }

            if (p.alergeni && p.alergeni.length > 0) {
                const trenAlergeniIds = p.alergeni.map(al => (al.alergenId || al.id).toString());
                document.querySelectorAll('input[name="alergeniIds"]').forEach(cb => {
                    if (trenAlergeniIds.includes(cb.value)) cb.checked = true;
                });
            }

        } catch (error) {
            console.error("Greška prilikom čitanja podataka o stavki:", error);
            alert("Nije moguće dobaviti podatke za ovu stavku.");
        }
    }

    function prikaziImeFajla(input) {
        const placeholder = document.getElementById('fajl-placeholder');
        if (input.files && input.files.length > 0) {
            placeholder.textContent = "Nova slika spremna: " + input.files[0].name;
            placeholder.className = "text-sm text-emerald-600 font-semibold";
        }
    }

    function toggleKategorijaUnos(select) {
        const noviUnos = document.getElementById('novaKategorijaNaziv');
        if (select.value !== "") {
            noviUnos.value = "";
            noviUnos.disabled = true;
            noviUnos.required = false;
            noviUnos.classList.add('bg-gray-100');
        } else {
            noviUnos.disabled = false;
            noviUnos.required = true;
            noviUnos.classList.remove('bg-gray-100');
        }
    }

    function vratiSeNazad() {
        window.location.href = `detalji-menija.html?meniId=${meniId}`;
    }

    async function sacuvajIzmeneStavke(event) {
        event.preventDefault();

        const selektovaniSastojci = Array.from(document.querySelectorAll('input[name="sastojciIds"]:checked')).map(cb => parseInt(cb.value));
        const selektovaniAlergeni = Array.from(document.querySelectorAll('input[name="alergeniIds"]:checked')).map(cb => parseInt(cb.value));
        const tekstSastojci = document.getElementById('noviSastojci').value;
        const noviSastojciLista = tekstSastojci ? tekstSastojci.split(',').map(s => s.trim()).filter(s => s.length > 0) : [];

        const podaciDto = {
            naziv: document.getElementById('naziv').value,
            opis: document.getElementById('opis').value,
            kalorije: parseFloat(document.getElementById('kalorije').value),
            kolicina: parseFloat(document.getElementById('kolicina').value),
            mernaJedinica: document.getElementById('mernaJedinica').value,
            kategorijaId: document.getElementById('kategorijaId').value ? parseInt(document.getElementById('kategorijaId').value) : null,
            novaKategorijaNaziv: document.getElementById('novaKategorijaNaziv').value || null,
            sastojciIds: selektovaniSastojci,
            noviSastojciNazivi: noviSastojciLista,
            alergeniIds: selektovaniAlergeni,
            cena: parseFloat(document.getElementById('cena').value),
            vremePripremeMin: parseInt(document.getElementById('vremePripremeMin').value),
            vremePripremeMax: parseInt(document.getElementById('vremePripremeMax').value)
        };

        const formData = new FormData();
        formData.append("podaci", new Blob([JSON.stringify(podaciDto)], { type: "application/json" }));

        const slikaFajl = document.getElementById('fotografija').files[0];
        if (slikaFajl) {
            formData.append("slika", slikaFajl);
        }

        try {
            const response = await fetch(`http://localhost:8080/api/stavke-menija/meni/${meniId}/stavka/${stavkaId}`, {
                method: 'PUT',
                headers: {
                    'X-User-Id': ulogovaniKorisnikId
                },
                body: formData
            });

            if (response.ok) {
                alert("Stavka uspešno izmenjena!");
                vratiSeNazad();
            } else {
                const errText = await response.text();
                alert("Greška prilikom izmene: " + (errText || "Proverite prava pristupa."));
            }
        } catch (error) {
            console.error("Mrežna greška:", error);
            alert("Greška pri komunikaciji sa serverom.");
        }
    }

    window.addEventListener('DOMContentLoaded', inicijalizujStranicu);
</script>
</body>
</html>
