<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Izaberite restoran</title>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <style>
        body { font-family: sans-serif; background: #faf7f2; padding: 40px; }
        h1 { margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 20px; }
        .card {
            background: white; border-radius: 16px; padding: 24px;
            border: 1.5px solid #e5e0d8; cursor: pointer; transition: all 0.2s;
        }
        .card:hover { border-color: #2d6a2d; transform: translateY(-2px); }
        h2 { font-size: 18px; margin-bottom: 6px; }
        p { color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>
<h1>Izaberite restoran</h1>
<div class="grid" id="grid">Učitavanje...</div>

<script>
    zastitiStranicu();

    async function ucitajRestorane() {
        try {
            const restorani = await apiFetch('/restorani');
            const grid = document.getElementById('grid');
            grid.innerHTML = restorani.map(r => `
                <div class="card" onclick="izaberiRestoran(${r.restoranId})">
                    <h2>${r.naziv}</h2>
                    <p>${r.adresa}</p>
                </div>
            `).join('');
        } catch {
            document.getElementById('grid').textContent = 'Greška pri učitavanju restorana.';
        }
    }

    function izaberiRestoran(restoranId) {
        localStorage.setItem('restoranId', restoranId);
        window.location.href = '/proizvodi.html';
    }

    ucitajRestorane();
</script>
</body>
</html>
