<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Bite – Omiljeni</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #2d6a2d; --green-lt: #3a8a3a;
            --orange: #e8721c; --cream: #faf7f2;
            --dark: #1a1a1a; --gray: #6b7280; --border: #e5e0d8;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }

        nav { background: white; border-bottom: 1px solid var(--border); padding: 0 40px; height: 68px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo-icon { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark); }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; color: var(--gray); transition: all 0.15s; }
        .nav-links a:hover { background: #f3f4f6; color: var(--dark); }
        .nav-links a.active { background: var(--orange); color: white; }
        .nav-links a.fav { color: var(--orange); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { font-size: 13px; color: var(--gray); background: #f3f4f6; padding: 6px 12px; border-radius: 20px; }
        .btn-odjava { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; transition: all 0.15s; }
        .btn-odjava:hover { border-color: #dc2626; color: #dc2626; }

        main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

        .page-header { margin-bottom: 32px; display: flex; align-items: center; gap: 14px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--dark); }
        .header-count { background: var(--orange); color: white; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white; border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden; transition: all 0.2s;
            position: relative;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

        .card-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 60px; background: linear-gradient(135deg, #fff9f5, #fef3e8); }

        .card-body { padding: 18px; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--dark); flex: 1; }

        .btn-remove {
            background: #fef2f2; color: #dc2626;
            border: none; border-radius: 8px;
            padding: 6px 12px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.15s; flex-shrink: 0;
        }
        .btn-remove:hover { background: #dc2626; color: white; }

        .card-desc { font-size: 13px; color: var(--gray); margin-bottom: 12px; line-height: 1.5; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .card-kcal { font-size: 13px; font-weight: 600; color: var(--orange); }
        .card-kat { font-size: 12px; background: #f0f7f0; color: var(--green); padding: 4px 10px; border-radius: 20px; font-weight: 500; }
        .card-date { font-size: 11px; color: var(--gray); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

        /* Empty state */
        .empty-wrap {
            grid-column: 1/-1;
            text-align: center; padding: 100px 0;
        }
        .empty-heart { font-size: 72px; margin-bottom: 16px; }
        .empty-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--dark); margin-bottom: 8px; }
        .empty-sub { color: var(--gray); font-size: 15px; margin-bottom: 24px; }
        .btn-explore {
            display: inline-block; background: var(--green); color: white;
            text-decoration: none; padding: 13px 28px; border-radius: 12px;
            font-weight: 600; font-size: 15px; transition: background 0.2s;
        }
        .btn-explore:hover { background: var(--green-lt); }
    </style>
</head>
<body>

<nav>
    <a href="/proizvodi.html" class="nav-logo">
        <div class="nav-logo-icon">🍽️</div>
        <span class="nav-logo-text">Big Bite</span>
    </a>
    <div class="nav-links">
        <a href="/proizvodi.html">Proizvodi</a>
        <a href="/kategorije.html">Kategorije</a>
        <a href="/omiljeni.html" class="active fav">♥ Omiljeni</a>
    </div>
    <div class="nav-right">
        <span class="nav-user" id="nav-user"></span>
        <button class="btn-odjava" onclick="odjavi()">Odjavi se</button>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>♥ Moji omiljeni</h1>
        <span class="header-count" id="header-count" style="display:none"></span>
    </div>

    <div id="grid" class="grid">
        <div class="empty-wrap">
            <div class="empty-heart">⏳</div>
            <p class="empty-sub">Učitavanje...</p>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    zastitiStranicu();
    document.getElementById('nav-user').textContent = getSesija().ime || '';

    const hrana = {'pizza':'🍕','burger':'🍔','pasta':'🍝','piletina':'🍗','piće':'🥤','supa':'🍲','salata':'🥗'};
    function getEmoji(naziv) {
        const n = naziv.toLowerCase();
        for (const [k, v] of Object.entries(hrana)) if (n.includes(k)) return v;
        return '🍽️';
    }

    async function ucitajOmiljene() {
        const grid = document.getElementById('grid');
        try {
            const lista = await api.getOmiljeni(getKupacId());

            if (!lista.length) {
                grid.innerHTML = `
                    <div class="empty-wrap">
                        <div class="empty-heart">🤍</div>
                        <div class="empty-title">Još nema omiljenih</div>
                        <p class="empty-sub">Dodajte proizvode u omiljene klikom na srce</p>
                        <a href="/proizvodi.html" class="btn-explore">Istraži proizvode</a>
                    </div>`;
                return;
            }

            const count = document.getElementById('header-count');
            count.textContent = lista.length + (lista.length === 1 ? ' proizvod' : ' proizvoda');
            count.style.display = 'inline-block';

            grid.innerHTML = lista.map(o => `
                <div class="card" id="card-${o.proizvod.proizvodId}">
                    <div class="card-img">${getEmoji(o.proizvod.naziv)}</div>
                    <div class="card-body">
                        <div class="card-top">
                            <div class="card-name">${o.proizvod.naziv}</div>
                            <button class="btn-remove" onclick="ukloniOmiljeni(${o.proizvod.proizvodId})">
                                Ukloni
                            </button>
                        </div>
                        <div class="card-desc">${o.proizvod.opis || 'Bez opisa'}</div>
                        <div class="card-footer">
                            <span class="card-kcal">${o.proizvod.kalorije ? o.proizvod.kalorije + ' kcal' : ''}</span>
                            <span class="card-kat">${o.proizvod.kategorija?.naziv || 'Ostalo'}</span>
                        </div>
                        <div class="card-date">Dodato: ${new Date(o.datumDodavanja).toLocaleDateString('sr-RS')}</div>
                    </div>
                </div>
            `).join('');
        } catch {
            grid.innerHTML = '<div class="empty-wrap"><div class="empty-heart">⚠️</div><p class="empty-sub">Greška pri učitavanju.</p></div>';
        }
    }

    async function ukloniOmiljeni(id) {
        try {
            await api.ukloniOmiljeni(getKupacId(), id);
            const card = document.getElementById(`card-${id}`);
            card.style.transition = 'all 0.3s';
            card.style.opacity = '0'; card.style.transform = 'scale(0.9)';
            setTimeout(() => { card.remove(); ucitajOmiljene(); }, 300);
        } catch { alert('Greška pri uklanjanju.'); }
    }

    ucitajOmiljene();
</script>
</body>
</html>
