<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Bite – Proizvodi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #2d6a2d; --green-lt: #3a8a3a;
            --orange: #2d6a2d; --cream: #faf7f2;
            --dark: #1a1a1a; --gray: #6b7280; --border: #e5e0d8;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }

        /* NAV */
        nav {
            background: white; border-bottom: 1px solid var(--border);
            padding: 0 40px; height: 68px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo-icon { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark); }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; color: var(--gray); transition: all 0.15s; }
        .nav-links a:hover { background: #f3f4f6; color: var(--dark); }
        .nav-links a.active { background: var(--green); color: white; }
        .nav-links a.fav { color: var(--orange); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { font-size: 13px; color: var(--gray); background: #f3f4f6; padding: 6px 12px; border-radius: 20px; }
        .btn-odjava { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; transition: all 0.15s; }
        .btn-odjava:hover { border-color: #dc2626; color: #dc2626; }

        /* MAIN */
        main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--dark); }
        .page-header p { color: var(--gray); font-size: 15px; margin-top: 4px; }

        /* SEARCH */
        .search-bar { display: flex; gap: 10px; margin-bottom: 32px; }
        .search-wrap { flex: 1; position: relative; }
        .search-wrap input {
            width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
            padding: 13px 16px 13px 44px; font-family: 'DM Sans', sans-serif;
            font-size: 15px; color: var(--dark); background: white; outline: none; transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--green); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 17px; pointer-events: none; }
        .btn-search { background: var(--green); color: white; border: none; border-radius: 12px; padding: 13px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .btn-search:hover { background: var(--green-lt); }
        .btn-reset { background: white; color: var(--gray); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 18px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-reset:hover { border-color: var(--dark); color: var(--dark); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* CARD */
        .card {
            background: white; border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

        .card-img-placeholder {
            width: 100%; height: 180px;
            background: linear-gradient(135deg, #f0ede8, #e8e4dc);
            display: flex; align-items: center; justify-content: center;
            font-size: 64px; overflow: hidden; position: relative; flex-shrink: 0;
        }
        .card-img-placeholder img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .card-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--dark); flex: 1; line-height: 1.3; }
        .btn-fav { background: none; border: none; cursor: pointer; font-size: 20px; padding: 2px 0 2px 8px; transition: transform 0.15s; flex-shrink: 0; }
        .btn-fav:hover { transform: scale(1.2); }

        .card-kat { font-size: 12px; background: #f0f7f0; color: var(--green); padding: 3px 10px; border-radius: 20px; font-weight: 500; display: inline-block; margin-bottom: 14px; }

        /* Dugmad na kartici */
        .card-actions { display: flex; gap: 8px; margin-top: auto; }

        .btn-detalji {
            flex: 1; background: white; color: var(--dark);
            border: 1.5px solid var(--border); border-radius: 10px;
            padding: 9px 12px; font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; display: flex; align-items: center;
            justify-content: center; gap: 6px;
        }
        .btn-detalji:hover { border-color: var(--green); color: var(--green); background: #f0f7f0; }

        .btn-korpa {
            flex: 1; background: var(--orange); color: white;
            border: none; border-radius: 10px;
            padding: 9px 12px; font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; display: flex; align-items: center;
            justify-content: center; gap: 6px;
        }
        .btn-korpa:hover { background: #d4621a; transform: scale(1.02); }
        .btn-korpa.dodato { background: var(--green); }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 0; color: var(--gray); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: white; border-radius: 24px; width: 100%; max-width: 560px;
            max-height: 90vh; overflow-y: auto;
            transform: translateY(20px); transition: transform 0.25s;
            box-shadow: 0 24px 80px rgba(0,0,0,0.2);
        }
        .modal-overlay.open .modal { transform: translateY(0); }

        .modal-img {
            width: 100%; height: 240px;
            background: linear-gradient(135deg, #f0ede8, #e8e4dc);
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; border-radius: 24px 24px 0 0;
            overflow: hidden; position: relative;
        }
        .modal-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

        .modal-body { padding: 28px; }

        .modal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .modal-naziv { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--dark); flex: 1; }
        .modal-close {
            background: #f3f4f6; border: none; border-radius: 50%;
            width: 36px; height: 36px; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s; flex-shrink: 0; margin-left: 12px;
        }
        .modal-close:hover { background: #e5e7eb; }

        .modal-kat { font-size: 12px; background: #f0f7f0; color: var(--green); padding: 4px 12px; border-radius: 20px; font-weight: 600; display: inline-block; margin-bottom: 16px; }

        .modal-opis { font-size: 15px; color: var(--gray); line-height: 1.7; margin-bottom: 24px; }

        .modal-info {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 12px; margin-bottom: 28px;
        }
        .info-box {
            background: var(--cream); border-radius: 14px;
            padding: 14px; text-align: center;
        }
        .info-box .info-icon { font-size: 22px; margin-bottom: 4px; }
        .info-box .info-val { font-size: 16px; font-weight: 700; color: var(--dark); }
        .info-box .info-label { font-size: 11px; color: var(--gray); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

        .modal-actions { display: flex; gap: 10px; }

        .modal-btn-fav {
            background: white; border: 1.5px solid var(--border);
            border-radius: 12px; padding: 13px 18px;
            font-size: 20px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-btn-fav:hover { border-color: #e8721c; transform: scale(1.05); }

        .modal-btn-korpa {
            flex: 1; background: var(--orange); color: white;
            border: none; border-radius: 12px; padding: 14px;
            font-family: 'DM Sans', sans-serif; font-size: 15px;
            font-weight: 700; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .modal-btn-korpa:hover { background: #61bf2c; }
        .modal-btn-korpa.dodato { background: var(--green); }

        /* Korpa brojač u navu */
        .nav-korpa {
            position: relative; background: none; border: 1.5px solid var(--border);
            border-radius: 8px; padding: 7px 14px; font-size: 13px;
            font-weight: 500; color: var(--gray); cursor: pointer;
            transition: all 0.15s; display: flex; align-items: center; gap: 6px;
        }
        .nav-korpa:hover { border-color: var(--orange); color: var(--orange); }
        .korpa-badge {
            background: var(--orange); color: white; border-radius: 50%;
            width: 18px; height: 18px; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            display: none;
        }
        .korpa-badge.visible { display: flex; }
    </style>
</head>
<body>

<nav>
    <a href="/proizvodi.html" class="nav-logo">
        <div class="nav-logo-icon">🍽️</div>
        <span class="nav-logo-text">Big Bite</span>
    </a>
    <div class="nav-links">
        <a href="/proizvodi.html" class="active">Proizvodi</a>
        <a href="/kategorije.html">Kategorije</a>
        <a href="/omiljeni.html" class="fav">♥ Omiljeni</a>
    </div>
    <div class="nav-right">
        <button class="nav-korpa" onclick="prikaziKorpu()">
            🛒 Korpa
            <span class="korpa-badge" id="korpa-badge">0</span>
        </button>
        <span class="nav-user" id="nav-user"></span>
        <button class="btn-odjava" onclick="odjavi()">Odjavi se</button>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>Svi proizvodi</h1>
        <p>Pronađite omiljenu hranu i piće</p>
    </div>

    <div class="search-bar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input id="pretraga" type="text" placeholder="Pretraži pizzu, burger, pastu...">
        </div>
        <button class="btn-search" onclick="pretraziProizvode()">Pretraži</button>
        <button class="btn-reset" onclick="ucitajProizvode()">Poništi</button>
    </div>

    <div id="grid" class="grid">
        <div class="empty-state"><div class="icon">⏳</div><p>Učitavanje...</p></div>
    </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="zatvoriModal(event)">
    <div class="modal" id="modal">
        <div class="modal-img" id="modal-img"></div>
        <div class="modal-body">
            <div class="modal-top">
                <div class="modal-naziv" id="modal-naziv"></div>
                <button class="modal-close" onclick="zatvoriModal()">✕</button>
            </div>
            <span class="modal-kat" id="modal-kat"></span>
            <p class="modal-opis" id="modal-opis"></p>
            <div class="modal-info">
                <div class="info-box">
                    <div class="info-icon">🔥</div>
                    <div class="info-val" id="modal-kcal">—</div>
                    <div class="info-label">Kalorije</div>
                </div>
                <div class="info-box">
                    <div class="info-icon">⚖️</div>
                    <div class="info-val" id="modal-kolicina">—</div>
                    <div class="info-label">Gramaza</div>
                </div>
                <div class="info-box">
                    <div class="info-icon">📦</div>
                    <div class="info-val" id="modal-jedinica">—</div>
                    <div class="info-label">Jedinica</div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn-fav" id="modal-btn-fav" onclick="toggleOmiljeniModal()">🤍</button>
                <button class="modal-btn-korpa" id="modal-btn-korpa" onclick="dodajUKorpuModal()">
                    🛒 Dodaj u korpu
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    zastitiStranicu();
    const sesija = getSesija();
    document.getElementById('nav-user').textContent = sesija.ime || sesija.email;

    let omiljeniIds = new Set();
    let korpa = JSON.parse(localStorage.getItem('korpa') || '[]');
    let aktivniProizvod = null;

    // Emoji mapa
    const hrana = {'pizza':'🍕','burger':'🍔','pasta':'🍝','piletina':'🍗','piće':'🥤','supa':'🍲','salata':'🥗','tiramisu':'🍰','cheesecake':'🍰','torta':'🍰','palačinke':'🥞','coca':'🥤','pepsi':'🥤','limunad':'🍋','sok':'🧃','voda':'💧','nuggets':'🍗','wings':'🍗'};
    function getEmoji(naziv) {
        const n = naziv.toLowerCase();
        for (const [k, v] of Object.entries(hrana)) if (n.includes(k)) return v;
        return '🍽️';
    }

    function azurirajKorpaBadge() {
        const badge = document.getElementById('korpa-badge');
        badge.textContent = korpa.length;
        badge.classList.toggle('visible', korpa.length > 0);
    }

    function sacuvajKorpu() {
        localStorage.setItem('korpa', JSON.stringify(korpa));
        azurirajKorpaBadge();
    }

    function prikaziKorpu() {
        if (korpa.length === 0) { alert('Korpa je prazna.'); return; }
        const lista = korpa.map(p => `• ${p.naziv}`).join('\n');
        alert(`🛒 Vaša korpa:\n\n${lista}\n\nUkupno: ${korpa.length} stavki`);
    }

    async function ucitajOmiljene() {
        try {
            const lista = await api.getOmiljeni(getKupacId());
            omiljeniIds = new Set(lista.map(o => o.proizvod.proizvodId));
        } catch {}
    }

    async function ucitajProizvode() {
        document.getElementById('pretraga').value = '';
        const grid = document.getElementById('grid');
        grid.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Učitavanje...</p></div>';
        await ucitajOmiljene();
        try {
            const lista = await api.getProizvodi();
            prikaziProizvode(lista);
        } catch {
            grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Greška pri učitavanju.</p></div>';
        }
    }

    async function pretraziProizvode() {
        const upit = document.getElementById('pretraga').value.trim();
        if (!upit) { ucitajProizvode(); return; }
        try {
            await api.zabeleziPretragu(getKupacId(), upit);
            const lista = await api.searchProizvodi(upit);
            prikaziProizvode(lista);
        } catch {
            document.getElementById('grid').innerHTML =
                '<div class="empty-state"><div class="icon">⚠️</div><p>Greška pri pretrazi.</p></div>';
        }
    }

    function prikaziProizvode(lista) {
        const grid = document.getElementById('grid');
        if (!lista.length) {
            grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Nema rezultata.</p></div>';
            return;
        }
        const uKorpi = new Set(korpa.map(p => p.id));
        grid.innerHTML = lista.map(p => `
            <div class="card">
                <div class="card-img-placeholder">
                    ${p.fotografija ? `<img src="${p.fotografija}" alt="${p.naziv}" loading="lazy">` : getEmoji(p.naziv)}
                </div>
                <div class="card-body">
                    <div class="card-top">
                        <div class="card-name">${p.naziv}</div>
                        <button class="btn-fav" onclick="toggleOmiljeni(${p.proizvodId}, this)">
                            ${omiljeniIds.has(p.proizvodId) ? '❤️' : '🤍'}
                        </button>
                    </div>
                    <span class="card-kat">${p.kategorija?.naziv || 'Ostalo'}</span>
                    <div class="card-actions">
                        <button class="btn-detalji" onclick="otvoriDetalje(${p.proizvodId})">
                            🔍 Detaljnije
                        </button>
                        <button class="btn-korpa ${uKorpi.has(p.proizvodId) ? 'dodato' : ''}"
                                id="btn-korpa-${p.proizvodId}"
                                onclick="dodajUKorpu(${p.proizvodId}, '${p.naziv}', this)">
                            ${uKorpi.has(p.proizvodId) ? '✓ Dodato' : '🛒 U korpu'}
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Otvori modal sa detaljima
    async function otvoriDetalje(proizvodId) {
        // Beleži PREGLED u bazi
        try { await api.zabeleziKlik(getKupacId(), proizvodId, 'PREGLED'); } catch {}

        // Pronađi proizvod iz liste (ili fetch)
        try {
            const p = await fetch(`http://localhost:8080/api/proizvodi/${proizvodId}`)
                .then(r => r.json());

            aktivniProizvod = p;

            // Popuni modal
            document.getElementById('modal-img').innerHTML = p.fotografija
                ? `<img src="${p.fotografija}" alt="${p.naziv}">`
                : getEmoji(p.naziv);

            document.getElementById('modal-naziv').textContent = p.naziv;
            document.getElementById('modal-kat').textContent = p.kategorija?.naziv || 'Ostalo';
            document.getElementById('modal-opis').textContent = p.opis || 'Bez opisa';
            document.getElementById('modal-kcal').textContent = p.kalorije ? p.kalorije + ' kcal' : '—';
            document.getElementById('modal-kolicina').textContent = p.kolicina || '—';
            document.getElementById('modal-jedinica').textContent = p.mernaJedinica || '—';

            // Omiljeni dugme
            const favBtn = document.getElementById('modal-btn-fav');
            favBtn.textContent = omiljeniIds.has(p.proizvodId) ? '❤️' : '🤍';

            // Korpa dugme
            const korpaBtn = document.getElementById('modal-btn-korpa');
            const uKorpi = korpa.some(k => k.id === p.proizvodId);
            korpaBtn.textContent = uKorpi ? '✓ U korpi' : '🛒 Dodaj u korpu';
            korpaBtn.className = 'modal-btn-korpa' + (uKorpi ? ' dodato' : '');

            // Otvori modal
            document.getElementById('modal-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        } catch {
            alert('Greška pri učitavanju detalja.');
        }
    }

    function zatvoriModal(event) {
        if (event && event.target !== document.getElementById('modal-overlay')) return;
        document.getElementById('modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
        aktivniProizvod = null;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') zatvoriModal();
    });

    // Toggle omiljeni sa kartice
    async function toggleOmiljeni(id, btn) {
        try {
            if (omiljeniIds.has(id)) {
                await api.ukloniOmiljeni(getKupacId(), id);
                omiljeniIds.delete(id);
                btn.textContent = '🤍';
            } else {
                await api.dodajOmiljeni(getKupacId(), id);
                omiljeniIds.add(id);
                btn.textContent = '❤️';
            }
        } catch { alert('Greška.'); }
    }

    // Toggle omiljeni iz modala
    async function toggleOmiljeniModal() {
        if (!aktivniProizvod) return;
        const id = aktivniProizvod.proizvodId;
        const btn = document.getElementById('modal-btn-fav');
        try {
            if (omiljeniIds.has(id)) {
                await api.ukloniOmiljeni(getKupacId(), id);
                omiljeniIds.delete(id);
                btn.textContent = '🤍';
            } else {
                await api.dodajOmiljeni(getKupacId(), id);
                omiljeniIds.add(id);
                btn.textContent = '❤️';
            }
            // Ažuriraj i dugme na kartici
            const karticaFav = document.querySelector(`[onclick="toggleOmiljeni(${id}, this)"]`);
            if (karticaFav) karticaFav.textContent = omiljeniIds.has(id) ? '❤️' : '🤍';
        } catch { alert('Greška.'); }
    }

    // Dodaj u korpu sa kartice
    async function dodajUKorpu(id, naziv, btn) {
        try {
            await api.zabeleziKlik(getKupacId(), id, 'KORPA');
        } catch {}

        if (korpa.some(k => k.id === id)) {
            korpa = korpa.filter(k => k.id !== id);
            btn.textContent = '🛒 U korpu';
            btn.classList.remove('dodato');
        } else {
            korpa.push({ id, naziv });
            btn.textContent = '✓ Dodato';
            btn.classList.add('dodato');
        }
        sacuvajKorpu();
    }

    // Dodaj u korpu iz modala
    async function dodajUKorpuModal() {
        if (!aktivniProizvod) return;
        const p = aktivniProizvod;
        const btn = document.getElementById('modal-btn-korpa');

        try { await api.zabeleziKlik(getKupacId(), p.proizvodId, 'KORPA'); } catch {}

        if (korpa.some(k => k.id === p.proizvodId)) {
            korpa = korpa.filter(k => k.id !== p.proizvodId);
            btn.textContent = '🛒 Dodaj u korpu';
            btn.classList.remove('dodato');
        } else {
            korpa.push({ id: p.proizvodId, naziv: p.naziv });
            btn.textContent = '✓ U korpi';
            btn.classList.add('dodato');
        }
        sacuvajKorpu();

        // Ažuriraj i dugme na kartici
        const karticaBtn = document.getElementById(`btn-korpa-${p.proizvodId}`);
        if (karticaBtn) {
            const uKorpi = korpa.some(k => k.id === p.proizvodId);
            karticaBtn.textContent = uKorpi ? '✓ Dodato' : '🛒 U korpu';
            karticaBtn.className = 'btn-korpa' + (uKorpi ? ' dodato' : '');
        }
    }

    document.getElementById('pretraga').addEventListener('keydown', e => {
        if (e.key === 'Enter') pretraziProizvode();
    });

    azurirajKorpaBadge();
    ucitajProizvode();
</script>
</body>
</html>
